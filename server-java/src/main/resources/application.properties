# Spring Boot configuration for the x402 Cardano demo (Java) server.
#
# All values are env-overridable via the standard Spring relaxed binding
# (DEMO_PAYTO -> demo.payTo, FACILITATOR_URL -> facilitatorUrl, etc.) so
# docker-compose can drive them.

server.port=${PORT:8003}
server.address=0.0.0.0

# Application config — populated by docker-compose.
demo.payTo=${DEMO_PAYTO_ADDRESS:}
demo.facilitatorUrl=${FACILITATOR_URL:http://facilitator:8080}
demo.corsOrigin=${CORS_ORIGIN:http://localhost:5173}
demo.network=${X402_NETWORK:cardano:preprod}

# Quieter startup
spring.main.banner-mode=off
logging.level.root=INFO
logging.level.org.springframework.web=INFO
